name: Auto-Generate and Deploy Flutter Project

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Flutter App Structure
        run: |
          # If a full flutter project hasn't been initialized yet, build it
          if [ ! -f "pubspec.yaml" ]; then
            flutter create tmp_app --project-name=bingo --platforms=web
            mv main.dart tmp_app/lib/main.dart 2>/dev/null || true
            mv tmp_app/* .
            mv tmp_app/.[!.]* . 2>/dev/null || true
            rm -rf tmp_app
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Automated: Setup initial clean Flutter web project structure"
            git push origin main
          fi

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Build Web Target
        run: flutter build web --base-href "/${{ github.event.repository.name }}/" --release

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web