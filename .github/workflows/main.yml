name: Auto-Generate and Deploy Flutter Project

on:
  push:
    branches:
      - AdminEnhance-branch

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://bureini.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Structural Alignment Safety
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "Initializing fresh web architecture structure..."
            if [ -f "main.dart" ]; then
              mv main.dart backup_main.dart
            fi
            
            flutter create tmp_app --project-name=my_bingo --platforms=web
            
            if [ -f "backup_main.dart" ]; then
              mv backup_main.dart tmp_app/lib/main.dart
            fi
            
            mv tmp_app/* . 2>/dev/null || true
            mv tmp_app/.[!.]* . 2>/dev/null || true
            rm -rf tmp_app
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Automated: Standardized project generation to my_bingo" || echo "No changes"
            git push origin main || echo "No changes to push"
          fi

      - name: Clean Conflicting Entrypoints
        run: |
          if [ -f "main.dart" ] && [ -f "lib/main.dart" ]; then
            rm -f main.dart
          fi

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Build Web Target
        run: flutter build web --base-href "/${{ github.event.repository.name }}/" --release --no-source-maps

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true
          
