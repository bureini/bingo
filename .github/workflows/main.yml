name: Auto-Generate Flutter Project Structures

on:
  push:
    branches:
      - main
    paths:
      - 'main.dart' # Only runs when main.dart is modified or added

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Java (Required by the Flutter environment)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up the Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Generate the full Flutter app structure
      - name: Generate Flutter App
        run: |
          # Create a temporary app structure
          flutter create tmp_app --project-name=my_automated_app
          
          # Move your custom main.dart into the new structure
          mv main.dart tmp_app/lib/main.dart
          
          # Move everything from the temporary folder to the root directory
          mv tmp_app/* .
          mv tmp_app/.[!.]* . 2>/dev/null || true
          
          # Clean up the temporary folder
          rm -rf tmp_app

      # 5. Commit and push the generated files back to GitHub
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all the newly generated files
          git add .
          
          # Check if there are actual changes to commit so the build doesn't crash
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
          else
            git commit -m "Automated: Generated Flutter project structure from main.dart"
            git push origin main
          fi
